<!DOCTYPE html>
<html>
<head>
  <title>Flash Sales - Login</title>
</head>
<body>

<h2> Flash Sales - Login</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="senha" placeholder="Senha"><br><br>

<button onclick="login()">Entrar</button>

<p id="msg"></p>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

 
const firebaseConfig = {
  apiKey: "AIzaSyDzrcDW06RngIQbOdE_bAQIvYY_Jxo7bEg",
  authDomain: "flash-sales-84292.firebaseapp.com"
};
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.login = function() {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    signInWithEmailAndPassword(auth, email, senha)
      .then((userCredential) => {
        userCredential.user.getIdToken().then(token => {
          console.log("TOKEN:", token);
          document.getElementById("msg").innerText = "Login realizado com sucesso!";
        });
      })
      .catch((error) => {
        document.getElementById("msg").innerText = "Erro: " + error.message;
      });
  }
</script>

</body>
</html>
